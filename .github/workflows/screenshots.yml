name: screenshots

# Publishes the UI screenshots to GitHub PAGES (not a release, not the git repo) so the
# README can embed always-current images with ZERO repo-size growth and no third-party
# host. On every push to `main` it captures headless (the `screenshooter` tool under
# xvfb), gathers the loose images (screens/*.png + editor/*.png + the GIFs; the frames/
# folder is intentionally excluded), and deploys them to Pages. Served at:
#
#   https://junebug12851.github.io/pokered-save-editor-2/screenshots/<name>
#
# This is a *deployment*, not a *release* — the Releases list stays software-only.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-screenshots
  cancel-in-progress: true

env:
  QT_VERSION: "6.8.3"

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build + capture deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            xvfb fonts-dejavu-core
          # Pillow for the `python3` actually on PATH (setup-python hostedtoolcache),
          # which make_gifs.py uses.
          python3 -m pip install --upgrade Pillow \
            || python3 -m pip install --break-system-packages --upgrade Pillow

      - name: Install Qt (Linux gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtcharts
          cache: true

      - name: Configure (Release, tests ON for the screenshooter target)
        run: cmake -S projects -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Capture screenshots (headless, xvfb)
        # Builds + runs the screenshooter under xvfb (MultiEffect via llvmpipe), then
        # assembles the GIFs with Pillow. Renders only -- never writes a save byte.
        run: bash scripts/capture_screenshots.sh

      - name: Assemble the Pages site (screens + editor + GIFs; NO frames/)
        run: |
          set -euo pipefail
          mkdir -p site/screenshots
          cp tmp/screenshots/screens/*.png site/screenshots/ 2>/dev/null || true
          cp tmp/screenshots/editor/*.png  site/screenshots/ 2>/dev/null || true
          cp tmp/screenshots/*.gif         site/screenshots/ 2>/dev/null || true
          test -n "$(ls -A site/screenshots)"   # fail if nothing was captured
          # Minimal browsable gallery at the site root.
          {
            echo '<!doctype html><meta charset="utf-8"><title>Pokered Save Editor - UI screenshots</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:1000px;margin:2rem auto;padding:0 1rem;color:#222}img{max-width:100%;border:1px solid #ddd;border-radius:6px;margin:.4rem 0}h3{margin:1.4rem 0 .2rem}</style>'
            echo '<h1>Pokered Save Editor &mdash; UI screenshots</h1>'
            echo '<p>Auto-updated from <code>main</code> by <code>.github/workflows/screenshots.yml</code>; embedded in the README. Not a software release &mdash; see the <a href="https://github.com/junebug12851/pokered-save-editor-2/releases">Releases</a> for downloads.</p>'
            for f in $(ls site/screenshots | sort); do
              echo "<h3>$f</h3><img src=\"screenshots/$f\" alt=\"$f\" loading=\"lazy\">"
            done
          } > site/index.html
          echo "assembled $(ls -1 site/screenshots | wc -l) images:"; ls -1 site/screenshots

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4

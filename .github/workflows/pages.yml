name: pages

# Builds and deploys the project's GitHub Pages site on every push to `main`:
#
#   /             -> a small landing page
#   /docs/        -> the generated Doxygen documentation (doxygen Doxyfile -> docs/html)
#   /screenshots/ -> the UI still screenshots (screens + editor), with a browsable
#                    gallery. Animated GIFs are added manually, not generated here.
#
# Docs reference the screenshots with the absolute Pages URL
# (https://junebug12851.github.io/pokered-save-editor-2/screenshots/<name>) -- which also
# works when the same Markdown is viewed on GitHub -- or relatively as ../screenshots/<name>
# from a /docs/ page. Images live on the Pages CDN: NOT in the git repo, NOT a release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  QT_VERSION: "6.8.3"

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build + capture + docs deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            xvfb fonts-dejavu-core \
            graphviz
          # Doxygen from the official binary, NOT apt: ubuntu's 1.9.1 mis-renders some
          # Markdown (blockquotes/emphasis -> leaked </blockquote>); 1.17 matches the
          # local toolchain and renders cleanly. /usr/local/bin precedes /usr/bin.
          DOXV=1.17.0
          # GitHub release first (reliable from Actions); doxygen.nl 403s datacenter/
          # curl requests, so fall back with a browser User-Agent.
          curl -fSL -o /tmp/doxygen.tgz \
            "https://github.com/doxygen/doxygen/releases/download/Release_${DOXV//./_}/doxygen-${DOXV}.linux.bin.tar.gz" \
            || curl -fSL -A "Mozilla/5.0" -o /tmp/doxygen.tgz \
            "https://www.doxygen.nl/files/doxygen-${DOXV}.linux.bin.tar.gz"
          tar -xzf /tmp/doxygen.tgz -C /tmp
          sudo install -m755 "/tmp/doxygen-${DOXV}/bin/doxygen" /usr/local/bin/doxygen
          doxygen --version

      - name: Install Qt (Linux gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtcharts
          cache: true

      - name: Configure (Release, tests ON for the screenshooter target)
        run: cmake -S projects -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Capture screenshots (headless, xvfb)
        # Still PNGs only -- renders the UI, never writes a save byte. No GIF assembly.
        run: bash scripts/capture_screenshots.sh

      - name: Generate Doxygen docs
        run: |
          set -euo pipefail
          # The Fairy Fox chrome subnav (in docs/fairyfox/header.html) now carries the
          # Screenshots + Repository + Notes links on every page, so no DoxygenLayout
          # user-tab injection is needed — build straight from the Doxyfile.
          doxygen Doxyfile
          test -d docs/html

      - name: Assemble the Pages site (Doxygen home at root + /screenshots/)
        run: |
          set -euo pipefail
          rm -rf site && mkdir -p site
          # The Doxygen home becomes the Pages ROOT (so / is the docs home page).
          cp -r docs/html/. site/
          test -f site/index.html
          # Themed screenshots gallery under /screenshots/ -- reuses the docs chrome +
          # stylesheet (../fairyfox-doxygen.css, ../ff-docs.js, ...) so it is seamless with
          # the rest of the site. The script copies the capture groups (screens/, editor/)
          # flat into site/screenshots/ and writes the gallery index.html.
          python3 scripts/build_gallery.py tmp/screenshots site/screenshots
          test -f site/screenshots/index.html
          test -n "$(ls site/screenshots/*.png 2>/dev/null)"
          echo "docs (root): $(find site -maxdepth 1 -type f | wc -l) files; screenshots: $(ls -1 site/screenshots/*.png | wc -l)"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4

name: tests

# Runs the QtTest/CTest suite on every push and PR.
#
# Two jobs:
#   * linux-asan  - the primary gate. Builds with AddressSanitizer + UBSan (which
#                   work properly on Linux, unlike the Windows llvm-mingw kit where
#                   ASan crashes in interception_win) and runs ctest headless.
#   * windows     - builds with the project's real kit (Qt 6 llvm-mingw) and runs
#                   ctest, matching Twilight's local environment.
#
# NOTE (first-run shakeout): the exact Qt module/arch names below may need a small
# tweak on the very first CI run. The CMake root is `projects/`. Tests don't need
# the `app` target, but the root find_package pulls in Quick/Charts/etc., so those
# Qt modules are installed here.
#
# ⚠️ THE QT VERSION HERE MUST MATCH THE KIT. Do not "helpfully" pin it back.
#
# It used to be 6.8.3 while the dev kit was 6.11, and that gap made the remote red
# from 0.29.0-alpha to 0.41.7-alpha WITHOUT ANYTHING LOCAL BEING ABLE TO SEE IT:
# mapengine.cpp used QImage::flipped() (Qt 6.9+), which compiled and passed on 6.11
# and does not exist on 6.8.3. Worse, release.yml builds the same code and had not
# run since v0.16.6-alpha -- so the next "ship" would have died AFTER the merge to
# main. A dev toolchain newer than the shipping one is a class of bug that no test
# can catch, because the broken code never reaches a compiler that rejects it.
# Fixed by converging on ONE Qt (leadership, 2026-07-17): kit == container == CI.
# If you bump the kit, bump this, docker/Dockerfile, lint.yml, pages.yml and
# release.yml in the same commit. See notes/reference/qt-patterns.md (top).

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Linux gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          # KEEP THIS == the kit (C:\Qt) and docker/Dockerfile's QT_VERSION. One Qt
          # everywhere is the whole point -- see the header comment above.
          version: "6.11.0"         # pinned exact so the Qt cache key is stable
          host: linux
          target: desktop
          arch: linux_gcc_64
          # qtdeclarative (Qt Quick) and qtsvg are essential components shipped
          # with the Qt 6 base package, NOT aqtinstall add-on modules -- listing
          # them here makes aqt fail ("packages ... not found while parsing XML").
          # Only genuine add-ons (qtcharts) belong in `modules`.
          modules: qtcharts qtmultimedia qtshadertools
          # Cache the installed Qt so a successful download is reused on later runs.
          # aqtinstall download.qt.io / mirror flakiness (e.g. a fallback mirror with
          # a bad SSL cert) only bites on a cache MISS; with the cache, almost every
          # run skips the download entirely. A rare cache-miss flake is fixed by a
          # re-run (which then populates the cache).
          cache: true

      - name: Configure (ASan + UBSan)
        run: >
          cmake -S projects -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build test targets
        # tests_all is a CMake aggregate that depends on every registered test exe,
        # so new suites are picked up automatically (no drift-prone explicit list).
        run: cmake --build build -j --target tests_all

      - name: Run ctest (headless, sanitized)
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Windows llvm-mingw)
        uses: jurplel/install-qt-action@v4
        with:
          # 6.11.0 + tools_llvm_mingw1706 makes this job an EXACT mirror of the kit
          # (C:\Qt\6.11.0\llvm-mingw_64 + C:\Qt\Tools\llvm-mingw1706_64), which is
          # what makes a red here mean something. See the header comment above.
          version: "6.11.0"         # pinned exact so the Qt cache key is stable
          # ⚠️ WHY THIS ONE JOB SOURCES aqtinstall FROM GIT -- do not "tidy" it back.
          #
          # Qt reorganised the WINDOWS repo at 6.11: qt6_6110/ no longer contains a
          # second qt6_6110/, it contains one folder PER ARCH (qt6_6110_llvm_mingw/,
          # qt6_6110_msvc2022_64/, ...), each with its own Updates.xml. Released
          # aqtinstall (3.3.0, and it IS the newest on PyPI -- June 2025) still nests
          # the version folder once, so it fetches qt6_6110/qt6_6110/Updates.xml, 404s,
          # and the job dies in 35s at this step having compiled nothing:
          #     ERROR : Failed to download checksum for the file 'Updates.xml'
          # 6.9 and 6.10 install fine; 6.11.0, 6.11.1 and 6.12.0 all fail identically.
          # LINUX IS UNAFFECTED (different repo layout), which is why only this job
          # needs it -- upstream's fix is even titled "for Windows x64".
          #
          # Fixed upstream by miurahr/aqtinstall#1000 ("Support Qt 6.11+ for Windows
          # x64", issue #959), MERGED 2026-03-24 -- but unreleased, hence git. Pinned
          # to the merge commit, not a branch: a moving master would make this job
          # non-reproducible, which is the exact disease we are curing.
          # ✅ REMOVE THIS the day aqtinstall cuts a release containing #1000 (> 3.3.0):
          #    just delete the two lines and let the action use its default.
          aqtsource: "git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b"
          host: windows
          target: desktop
          arch: win64_llvm_mingw
          # See linux-asan note: qtdeclarative/qtsvg are base components, not modules.
          modules: qtcharts qtmultimedia qtshadertools
          tools: "tools_llvm_mingw1706"
          cache: true               # reuse a successful download; see linux-asan note

      - name: Configure
        shell: bash
        run: >
          cmake -S projects -B build
          -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Debug

      - name: Build test targets
        # tests_all aggregate -- see linux-asan note.
        run: cmake --build build -j --target tests_all

      - name: Run ctest
        # offscreen so the GUI tests (tst_qml_screens, tst_gui_*) run headless and
        # deterministically on the CI runner, matching the Linux job. (Each GUI test
        # also sets this per-test in CMake, so this is belt-and-suspenders.)
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

name: release

# Builds release artifacts and publishes a GitHub Release whenever `main` advances
# to a NEW version. The trigger is a push to `main`. Under the git-flow model
# (notes/reference/git-workflow.md) `main` advances only by a `--no-ff` tagged-
# release merge from green `dev` (PATCH) or a `release/*`/`hotfix/*` branch, so a
# main push is always all-green. The gate is that the tag `v<VERSION>` does not yet
# exist -- i.e. VERSION has been bumped since the last release. If VERSION is
# unchanged (tag already exists), the run is a no-op. So: bump VERSION (PATCH/MINOR)
# -> the next main merge cuts the release; merges that don't bump VERSION don't.
#
# This pipeline OWNS tagging: the `version` job derives `v<VERSION>` and the
# `release` job's softprops/action-gh-release creates the tag on the merge commit.
# That's the project's one deliberate divergence from the hub git-flow runbook
# (which tags by hand) -- so DO NOT `git tag` manually when releasing, or this run
# sees the tag already exists and skips. See notes/reference/git-workflow.md.
#
# Artifacts attached to the release:
#   * Windows portable .zip            (windeployqt'd, run-in-place)
#   * Windows installer .exe           (Inno Setup)
#   * Linux .AppImage                  (portable, double-click run)
#   * Linux portable .tar.gz           (the AppDir tree)
#   * Doxygen HTML docs .zip
#   * UI screenshots .zip              (the screenshooter, headless under xvfb)
#
# workflow_dispatch lets you DRY-RUN: it builds + uploads everything as workflow
# artifacts but (with dry_run = true, the default) does NOT create the Release.
#
# Toolchain mirrors .github/workflows/tests.yml (the proven-locally Qt setup):
# Qt 6.11.0 via install-qt-action; Windows = win64_llvm_mingw + tools_llvm_mingw1706
# + "MinGW Makefiles"; Linux = linux_gcc_64 + Ninja. Just Release instead of Debug,
# and the app target instead of tests.
#
# ⚠️ THIS IS THE JOB THE QT SPLIT NEARLY KILLED. It builds the same appcore the test
# jobs do, but only runs on a main push that bumped VERSION -- so between v0.16.6-alpha
# and 0.41.8-alpha it never ran, and never noticed that appcore had stopped compiling
# on the pinned Qt. The next "ship" would have failed HERE, after the merge to main.
# The Qt version is now the kit's, everywhere. Keep it that way; see tests.yml's
# ⚠️ block and notes/reference/qt-patterns.md (top).
#
# NOTE: like tests.yml, the very first run may need a small shakeout (windeployqt
# runtime DLLs, linuxdeploy-qt QML discovery, Inno path). Shakeout points are
# flagged inline. See notes/reference/deployment.md.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts but do NOT publish a GitHub Release"
        type: boolean
        default: true

permissions:
  contents: write          # create the tag + release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # MUST match the kit / docker/Dockerfile / tests.yml / lint.yml / pages.yml.
  QT_VERSION: "6.11.0"

jobs:
  # ---------------------------------------------------------------------------
  # Decide whether to release: read VERSION, derive the tag, check it's new.
  # ---------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          # First non-comment, non-blank line of VERSION (strip whitespace/CR).
          VER=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' VERSION | head -n1 | tr -d '[:space:]\r')
          TAG="v${VER}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          # A '-' label (-alpha/-beta/-rc) => mark the GitHub Release as a prerelease.
          if printf '%s' "$VER" | grep -q '-'; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists -> nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} is new -> will build + release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Windows: portable .zip + Inno Setup installer .exe
  # ---------------------------------------------------------------------------
  windows:
    needs: version
    if: needs.version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Windows llvm-mingw)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_llvm_mingw
          modules: qtcharts qtmultimedia qtshadertools
          tools: "tools_llvm_mingw1706"
          cache: true

      - name: Configure (Release)
        shell: bash
        run: >
          cmake -S projects -B build
          -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DPSE_BUILD_TESTS=OFF

      - name: Build app
        run: cmake --build build -j --target PokeredSaveEditor

      - name: Deploy Qt runtime (windeployqt)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/PokeredSaveEditor
          EXE=$(find build -name PokeredSaveEditor.exe | head -n1)
          echo "exe: $EXE"
          cp "$EXE" dist/PokeredSaveEditor/
          # Use OUR Qt's windeployqt by FULL PATH -- a stray windeployqt on PATH (a
          # different Qt) is what hit "Unable to find the platform plugin" and aborted
          # without deploying. (--compiler-runtime is MSVC/g++ only, so it's omitted and
          # the runtime DLLs are copied by hand; tolerate a nonzero rc, verify below.)
          WDQT="$QT_ROOT_DIR/bin/windeployqt.exe"
          echo "windeployqt: $WDQT"
          "$WDQT" --release --no-translations \
            --qmldir projects/app/ui \
            dist/PokeredSaveEditor/PokeredSaveEditor.exe \
            || echo "windeployqt returned $? -- verifying/repairing deployment below"
          # Fallback: if windeployqt under-deployed (no Qt6Core.dll), deploy the Qt
          # runtime DLLs + the essential plugin sets + the full QML dir by hand.
          if [ ! -f dist/PokeredSaveEditor/Qt6Core.dll ]; then
            echo "windeployqt under-deployed -- manual fallback"
            cp "$QT_ROOT_DIR"/bin/Qt6*.dll dist/PokeredSaveEditor/ 2>/dev/null || true
            for pg in platforms styles imageformats iconengines tls networkinformation generic; do
              [ -d "$QT_ROOT_DIR/plugins/$pg" ] && mkdir -p "dist/PokeredSaveEditor/$pg" \
                && cp -r "$QT_ROOT_DIR/plugins/$pg/." "dist/PokeredSaveEditor/$pg/" || true
            done
            # QML modules (the app imports QtQuick/Controls.Material/Layouts/Effects/...);
            # copy the whole module tree -- simplest reliable option.
            cp -r "$QT_ROOT_DIR/qml/." dist/PokeredSaveEditor/ 2>/dev/null || true
          fi
          # Make sure the Windows platform plugin is present (hand-copy if still missed).
          if [ ! -f dist/PokeredSaveEditor/platforms/qwindows.dll ]; then
            mkdir -p dist/PokeredSaveEditor/platforms
            cp "$QT_ROOT_DIR/plugins/platforms/qwindows.dll" dist/PokeredSaveEditor/platforms/
          fi
          # llvm-mingw C++/unwind/pthread runtime DLLs (compiler bin is on PATH; fall
          # back to searching Qt Tools).
          CXXBIN=$(dirname "$(command -v clang++ 2>/dev/null || command -v clang 2>/dev/null || echo /nonexistent)")
          echo "compiler bin: $CXXBIN"
          for dll in libc++.dll libunwind.dll libwinpthread.dll; do
            [ -f "$CXXBIN/$dll" ] && cp "$CXXBIN/$dll" dist/PokeredSaveEditor/ && echo "copied $dll" || true
          done
          if [ ! -f dist/PokeredSaveEditor/libc++.dll ]; then
            for dll in libc++.dll libunwind.dll libwinpthread.dll; do
              f=$(find "${IQTA_TOOLS:-/}" -name "$dll" 2>/dev/null | head -n1)
              [ -n "$f" ] && cp "$f" dist/PokeredSaveEditor/ && echo "copied $dll from $f" || true
            done
          fi
          # Sanity: the core Qt runtime + platform plugin MUST be present, else fail.
          echo "--- deployed (top level) ---"; ls dist/PokeredSaveEditor
          test -f dist/PokeredSaveEditor/Qt6Core.dll
          test -f dist/PokeredSaveEditor/platforms/qwindows.dll

      - name: Package portable .zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          $ver = "${{ needs.version.outputs.version }}"
          Compress-Archive -Path dist/PokeredSaveEditor/* `
            -DestinationPath "out/PokeredSaveEditor-$ver-windows-x64-portable.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # ISCC is pre-installed on windows-latest. Resolve it robustly: the braces
          # around ${Env:ProgramFiles(x86)} are REQUIRED -- "$Env:ProgramFiles(x86)"
          # mis-parses (PowerShell reads it as $Env:ProgramFiles + literal "(x86)").
          $iscc = "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source }
          if (-not $iscc) { choco install innosetup --no-progress -y; $iscc = "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found" }
          Write-Host "ISCC: $iscc"
          $ver = "${{ needs.version.outputs.version }}"
          & $iscc `
            "/DMyAppVersion=$ver" `
            "/DMySourceDir=$(Resolve-Path dist/PokeredSaveEditor)" `
            "/DMyOutputDir=$(Join-Path (Get-Location) 'out')" `
            "/DMyIconFile=$(Resolve-Path projects/app/assets/icons/app/icon.ico)" `
            packaging/windows/installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: out/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux: AppImage + portable .tar.gz + UI screenshots .zip
  # ---------------------------------------------------------------------------
  linux:
    needs: version
    if: needs.version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04          # older base => wider AppImage glibc compatibility
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1   # run the linuxdeploy AppImages without FUSE on CI
    steps:
      - uses: actions/checkout@v4

      - name: Install build + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            xvfb fonts-dejavu-core \
            doxygen graphviz \
            file desktop-file-utils

      - name: Install Qt (Linux gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtcharts qtmultimedia qtshadertools
          cache: true

      - name: Configure (Release, tests ON so the screenshooter target exists)
        run: >
          cmake -S projects -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release

      - name: Build app
        run: cmake --build build -j --target PokeredSaveEditor

      - name: Fetch linuxdeploy + Qt plugin
        run: |
          base="https://github.com/linuxdeploy"
          curl -fL -o linuxdeploy.AppImage \
            "$base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          curl -fL -o linuxdeploy-plugin-qt.AppImage \
            "$base/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy*.AppImage

      - name: Build AppImage + portable tar.gz
        run: |
          set -euo pipefail
          ver="${{ needs.version.outputs.version }}"
          EXE=$(find build -type f -name PokeredSaveEditor | head -n1)
          echo "exe: $EXE"
          mkdir -p AppDir/usr/bin
          cp "$EXE" AppDir/usr/bin/
          # linuxdeploy-plugin-qt discovers QML imports from these source paths.
          export QML_SOURCES_PATHS="$PWD/projects/app/ui"
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          export OUTPUT="PokeredSaveEditor-${ver}-x86_64.AppImage"
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --executable "$EXE" \
            --desktop-file packaging/linux/PokeredSaveEditor.desktop \
            --icon-file projects/app/assets/icons/app/256x256.png \
            --icon-filename PokeredSaveEditor \
            --plugin qt \
            --output appimage
          mkdir -p out
          mv "$OUTPUT" "out/$OUTPUT"
          # Portable tarball = the fully-populated AppDir (Qt libs bundled).
          tar -C AppDir -czf "out/PokeredSaveEditor-${ver}-linux-x64-portable.tar.gz" .

      - name: Capture UI screenshots (headless, xvfb)
        run: |
          set -euo pipefail
          ver="${{ needs.version.outputs.version }}"
          # Builds the `screenshooter` target into the existing build/ and runs it
          # under xvfb (real GPU-less X => MultiEffect renders via llvmpipe). Still
          # PNGs only; never writes a save byte. Animated GIFs are added manually.
          bash scripts/capture_screenshots.sh
          ( cd tmp/screenshots && zip -r "$GITHUB_WORKSPACE/out/PokeredSaveEditor-${ver}-screenshots.zip" . )

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: out/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Doxygen HTML docs -> .zip
  # ---------------------------------------------------------------------------
  docs:
    needs: version
    if: needs.version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz zip
          # Doxygen from the official binary (apt's 1.9.1 mis-renders Markdown; 1.17
          # matches the local toolchain). /usr/local/bin precedes /usr/bin.
          DOXV=1.17.0
          # GitHub release first (reliable from Actions); doxygen.nl 403s datacenter/
          # curl requests, so fall back with a browser User-Agent.
          curl -fSL -o /tmp/doxygen.tgz \
            "https://github.com/doxygen/doxygen/releases/download/Release_${DOXV//./_}/doxygen-${DOXV}.linux.bin.tar.gz" \
            || curl -fSL -A "Mozilla/5.0" -o /tmp/doxygen.tgz \
            "https://www.doxygen.nl/files/doxygen-${DOXV}.linux.bin.tar.gz"
          tar -xzf /tmp/doxygen.tgz -C /tmp
          sudo install -m755 "/tmp/doxygen-${DOXV}/bin/doxygen" /usr/local/bin/doxygen
          doxygen --version
      - name: Generate docs
        run: doxygen Doxyfile
      - name: Package docs .zip
        run: |
          set -euo pipefail
          ver="${{ needs.version.outputs.version }}"
          mkdir -p out
          if [ ! -d docs/html ]; then echo "docs/html not produced (check Doxyfile OUTPUT_DIRECTORY/HTML_OUTPUT)"; exit 1; fi
          ( cd docs/html && zip -r "$GITHUB_WORKSPACE/out/PokeredSaveEditor-${ver}-docs.zip" . )
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: out/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish: gather all artifacts, create the tag + GitHub Release.
  # Skipped on a dry-run workflow_dispatch.
  # ---------------------------------------------------------------------------
  release:
    needs: [version, windows, linux, docs]
    if: >
      needs.version.outputs.should_release == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    steps:
      # Full history + tags so the notes step can diff this release against the
      # previous release tag (to pull the changelog entries added since).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Build a human, structured release body that actually describes THIS release.
      # Order (top -> bottom): a plain-English "what this means for you", then the
      # itemised changes (pulled from our living changelog for exactly this release),
      # then how to get it, then links. softprops appends the auto "What's Changed"
      # (the raw commit/PR list -- the deepest technical layer) below all of this.
      #
      # The per-release prose comes from one of two sources, in order:
      #   1. A hand-curated notes/releases/<version>.md (write one for a big release).
      #   2. Otherwise, the changelog entries ADDED to notes/version/ since the last
      #      release tag -- these are already plain-English ("what + why"), newest first.
      - name: Compose release notes
        shell: bash
        run: |
          set -uo pipefail
          ver="${{ needs.version.outputs.version }}"
          repo="${{ github.server_url }}/${{ github.repository }}"

          # --- gather the per-release prose -------------------------------------
          curated="notes/releases/${ver}.md"
          changes=""
          if [ -f "$curated" ]; then
            changes="$(cat "$curated")"
          else
            prev="$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)"   # previous release (by ancestry)
            range="HEAD"; [ -n "$prev" ] && range="${prev}..HEAD"
            # Added lines to the monthly changelog files in this range = the new
            # entries (we prepend newest-first). Strip the leading '+', drop diff
            # headers and the per-file "N commit(s) this month" counter line.
            changes="$(git diff $range -- 'notes/version/*.md' 2>/dev/null \
              | sed -n 's/^+//p' \
              | grep -vE '^\+\+ |commit\(s\) this month|^# Version History|All months \(index\)' \
              | sed '/./,$!d' || true)"
          fi
          [ -n "${changes//[$'\n\r\t ']/}" ] || changes="_See the commit list below for what changed in this build._"

          # --- compose ----------------------------------------------------------
          {
            echo "**Pokered Save Editor v${ver}** — a free, open-source save-file editor for Pokémon Red & Blue (Gen 1), built with Qt 6 (C++/QML)."
            echo
            echo "It lets you open a \`.sav\` and edit your team, items, Pokédex, trainer card, PC boxes and more, with bit-for-bit fidelity (it changes only what you change)."
            echo
            if [ "${{ needs.version.outputs.prerelease }}" = "true" ]; then
              echo "> ⚠️ **Pre-release / alpha** — under active development, so expect rough edges and occasional changes to how things work. The downloads are **unsigned**, so Windows SmartScreen (and some Linux setups) will warn on first launch — that's expected for an alpha, not a problem with the file."
              echo
            fi
            echo "## What's new in this release"
            echo
            echo "$changes"
            echo
            echo "## How to get it"
            echo
            echo "| Platform | File | What to do |"
            echo "|---|---|---|"
            echo "| Windows | \`*-windows-x64-setup.exe\` | Installer — **recommended**; just run it. |"
            echo "| Windows | \`*-windows-x64-portable.zip\` | No-install — unzip and run \`PokeredSaveEditor.exe\`. |"
            echo "| Linux | \`*-x86_64.AppImage\` | Portable — \`chmod +x\` then run. |"
            echo "| Linux | \`*-linux-x64-portable.tar.gz\` | Portable tree — extract and run \`usr/bin/PokeredSaveEditor\`. |"
            echo
            echo "Also attached: \`*-docs.zip\` (generated code docs) and \`*-screenshots.zip\` (UI screenshots)."
            echo
            echo "## Links"
            echo
            echo "- 📖 **Docs & screenshots:** https://junebug12851.github.io/pokered-save-editor-2/"
            echo "- 📝 **Full changelog (every commit):** ${repo}/tree/main/notes/version"
            echo "- 🐛 **Issues / feedback:** ${repo}/issues"
            echo
            echo "_Built automatically from \`main\`. The deepest technical layer — the raw commit list — is in **What's Changed** below._"
          } > RELEASE_BODY.md
          echo "----- composed release body -----"; cat RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Pokered Save Editor ${{ needs.version.outputs.tag }}
          body_path: RELEASE_BODY.md
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*

<!-- HTML header for doxygen 1.17.0 -->
<!--
  Fairy Fox docs chrome — the shared docs-site "chrome bundle" (hub chrome VERSION 2.0.0),
  wired for Doxygen per hub/standards/docs-site/chrome/adapters/doxygen.md.

  This is a VENDORED copy of the bundle, not a hand-reimplementation: the header/subnav/
  footer markup is copied verbatim from the bundle's head.html/header.html/subnav.html,
  and the behaviour + palette come from the pulled master assets main.css + reader.js +
  nav.js (all under docs/fairyfox/). Only the {{FF_*}} slots and the per-page .active
  marker differ from the bundle.

  DOCUMENTED DEVIATION (see notes/decisions/architecture.md): the bundle's head.html
  loads the type families from Google Fonts; this project instead loads the SELF-HOSTED
  woff2 copies (docs/fairyfox/fonts/fonts.css) to keep the no-third-party-IP posture the
  hub legal-docs standard asks for. Same families/weights — only the source differs.
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "https://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="$langISO">

<meta http-equiv="Content-Type" content="text/xhtml;charset=UTF-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=11"/>

<meta name="viewport" content="width=device-width, initial-scale=1"/>

<!-- bundle head.html · 1 — browser-chrome colour, per scheme (identical mesh-wide) -->
<meta name="theme-color" content="#ef6149" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#191116" media="(prefers-color-scheme: dark)"/>

<!-- Project glue (NOT the bundle): classify the page BEFORE the pre-paint reader script + first
     paint. (a) ff-no-sidebar on prose / list pages → full width, no treeview (API pages keep the
     treeview); (b) data-story on ACTUAL rendered note content (the README + the markdown notes) so
     the reader's line-spacing + width controls UNLOCK when you're reading a note — but NOT on the
     index / "list of notes to click on" pages. Must run before the pre-paint script (it reads
     data-story). -->
<script>
(function(){try{var p=location.pathname,f=p.substring(p.lastIndexOf("/")+1)||"index.html",r=document.documentElement,
md=/_8md\.html$/.test(f)||/_8dox\.html$/.test(f)||/^md_/.test(f),
fullwidth=(f==="index.html"||p.indexOf("/screenshots/")!==-1),  // Overview + gallery only
story=(f==="index.html"||md);                                    // actual readable content
if(fullwidth)r.classList.add("ff-no-sidebar");   // no left pane on the two landings
if(story)r.setAttribute("data-story","");         // reading controls on the content pane
}catch(e){}})();
</script>

<!-- bundle head.html · 2 — reader pre-paint: apply the saved theme/accent/text vars BEFORE
     first paint (from the origin-wide fairyfox:reader:b key) so there's no flash and the
     choice carries across every fairyfox.io site. Copied verbatim from the bundle; kept in
     sync with reader.js. Loaded before <body> so it runs before the page renders. -->
<script>
(function(){try{var p=JSON.parse(localStorage.getItem("fairyfox:reader:b")||"{}"),r=document.documentElement,
S=[15,16.5,18,20,22],L={tight:1.5,normal:1.65,relaxed:1.9},W={narrow:"38rem",normal:"46rem",wide:"58rem"};
if(p.theme&&p.theme!=="system")r.setAttribute("data-theme",p.theme);
if(p.size!=null)r.style.fontSize=S[Math.max(0,Math.min(S.length-1,p.size|0))]+"px";
var story=r.hasAttribute("data-story");
if(story&&p.lh)r.style.setProperty("--reading-lh",String(L[p.lh]||L.normal));
if(story&&p.width)r.style.setProperty("--reading-width",W[p.width]||W.normal);
if(p.accent){var h=p.accent,ink="color-mix(in srgb, "+h+", var(--text) 42%)";
r.style.setProperty("--accent",h);r.style.setProperty("--violet",h);
r.style.setProperty("--violet-deep","color-mix(in srgb, "+h+", #000 12%)");
r.style.setProperty("--accent-ink",ink);r.style.setProperty("--link",ink);
r.style.setProperty("--link-hover","color-mix(in srgb, "+h+", var(--text) 26%)");
r.style.setProperty("--glow","color-mix(in srgb, "+h+" 40%, transparent)");}}catch(e){}})();
</script>

<!-- bundle head.html · 3 — fonts. DEVIATION: self-hosted woff2 (Fraunces / Inter /
     JetBrains Mono), NOT Google Fonts — same families/weights, no third-party IP
     exposure. See notes/decisions/architecture.md. -->
<link href="$relpath^fonts.css" rel="stylesheet" type="text/css"/>
